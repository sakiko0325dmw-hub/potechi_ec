<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>カート - ぽてちのおみせ</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      /* --- カートページ専用のスタイル --- */
      main {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .page-title {
        text-align: center;
        margin-bottom: 40px;
      }
      .page-title h2 {
        font-size: 24px;
        color: #7b6858;
        margin-bottom: 5px;
      }

      /* カートの中身を包む大きな箱 */
      .cart-container {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(163, 143, 122, 0.1);
      }

      /* グッズ1件ごとの並び */
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px dashed #e6dfd5;
        color: #7b6858;
      }
      .cart-item:last-child {
        border-bottom: none;
      }
      .item-name {
        font-weight: bold;
        font-size: 16px;
      }
      .item-price {
        font-weight: bold;
        color: #c8ab8d;
      }

      /* カートが空っぽのときのメッセージ */
      .empty-message {
        text-align: center;
        padding: 40px 0;
        color: #a38f7a;
        font-size: 16px;
      }

      /* ボタン関係 */
      .cart-buttons {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
      }
      .btn-clear {
        background: #e8f0eb;
        color: #8daea0;
        border: none;
        padding: 10px 20px;
        border-radius: 999px;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
      }
      .btn-back {
        display: inline-block;
        background: #c8ab8d;
        color: white;
        text-decoration: none;
        padding: 12px 40px;
        border-radius: 999px;
        font-weight: bold;
        font-size: 15px;
      }
    </style>
  <header>
      <div class="header-container">
        <div class="logo">
          <h1>Potechi</h1>
          <p>ぽてちのおみせ</p>
        </div>

        <nav>
          <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <ul id="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="goods.html">GOODS</a></li>
            <li><a href="news.html">NEWS</a></li>
            <li><a href="contact.html">CONTACT</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <div class="page-title">
        <h2>SHOPPING CART</h2>
        <p>カートの中身</p>
      </div>

      <div class="cart-container">
        <div id="cart-list"></div>

        <div class="cart-buttons">
          <button class="btn-clear" id="btn-clear">カートを空にする</button>
          <a href="goods.html" class="btn-back">お買い物を続ける</a>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-container">
        <div class="footer-left">
          <h2>POTECHI</h2>
          <p>&copy; 2026 potechi_hamu. All Rights Reserved.</p>
        </div>
        <div class="footer-right">
          <ul>
            <li><a href="index.html">トップ</a></li>
            <li><a href="about.html">ぽてちについて</a></li>
            <li><a href="goods.html">グッズショップ</a></li>
          </ul>
        </div>
      </div>
    </footer>

    <script>
      // 1. ブラウザの記憶からカートのデータを引っ張り出す
      let cart = JSON.parse(localStorage.getItem("potechi_cart")) || [];

      const cartList = document.getElementById("cart-list");
      const btnClear = document.getElementById("btn-clear");

      // 2. カートの中身を表示する関数
      function displayCart() {
        // いったん表示をクリア
        cartList.innerHTML = "";

        if (cart.length === 0) {
          // カートが空っぽのとき
          cartList.innerHTML =
            '<p class="empty-message">カートは空っぽです🐹<br>お気に入りのグッズを見つけてね！</p>';
          btnClear.style.display = "none"; // 空にするボタンを隠す
        } else {
          // カートに商品が入っているとき、1個ずつ画面に組み立てていく
          cart.forEach(function (item) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "cart-item";
            itemDiv.innerHTML = `
                        <span class="item-name">${item.name}</span>
                        <span class="item-price">${item.price}</span>
                    `;
            cartList.appendChild(itemDiv);
          });
          btnClear.style.display = "block"; // 空にするボタンを表示
        }
      }

      // 3. 「カートを空にする」ボタンが押されたときの仕事
      btnClear.addEventListener("click", function () {
        // 記憶を消す
        localStorage.removeItem("potechi_cart");
        cart = [];
        // 画面を更新
        displayCart();
      });

      // ページを開いた瞬間に、まずはカートの中身を表示する
      displayCart();
    </script>
  </body>
</html>
